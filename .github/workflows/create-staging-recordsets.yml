name: Create Staging RecordSets

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — preview without creating anything'
        type: boolean
        default: true
      project_name:
        description: 'Limit to one project (e.g. htan2-testing1). Leave empty for all.'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.11'

jobs:
  create-staging-recordsets:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: pip install --upgrade pip && pip install -r requirements.txt

    - name: Create staging RecordSets
      env:
        SYNAPSE_PAT: ${{ secrets.SYNAPSE_PAT }}
        SYNAPSE_USERNAME: ${{ secrets.SYNAPSE_USERNAME }}
      run: |
        CMD="python scripts/manage/create_staging_recordsets.py"

        if [ "${{ inputs.dry_run }}" = "true" ]; then
          CMD="$CMD --dry-run"
        fi

        if [ -n "${{ inputs.project_name }}" ]; then
          CMD="$CMD --project-name ${{ inputs.project_name }}"
        fi

        echo "Running: $CMD"
        $CMD

    - name: Commit updated config
      if: ${{ inputs.dry_run != 'true' }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add schema_binding_config.yml
        if git diff --cached --quiet; then
          echo "No config changes to commit."
        else
          git commit -m "Add staging RecordSet IDs to schema_binding_config.yml [skip ci]"
          git push
        fi
