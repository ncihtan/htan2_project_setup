name: Promote Ingest to Staging

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — preview changes without modifying Synapse'
        type: boolean
        default: true
      annotate:
        description: 'Annotate moved files with promoted_at / promoted_from'
        type: boolean
        default: true
      bq_project:
        description: 'GCP project for BigQuery'
        type: string
        default: 'htan2-dcc'
      files_table:
        description: 'BQ files table — full reference (project.dataset.table)'
        type: string
        required: true
      records_table:
        description: 'BQ recordsets table — full reference (project.dataset.table)'
        type: string
        required: true
      skip_files:
        description: 'Skip file promotion (RecordSet rows only)'
        type: boolean
        default: false
      skip_records:
        description: 'Skip RecordSet row promotion (files only)'
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: pip install --upgrade pip && pip install -r requirements.txt

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

    - name: Run promotion
      env:
        SYNAPSE_PAT: ${{ secrets.SYNAPSE_PAT }}
        SYNAPSE_USERNAME: ${{ secrets.SYNAPSE_USERNAME }}
      run: |
        CMD="python scripts/promote_ingest_to_staging.py"
        CMD="$CMD --bq-project ${{ inputs.bq_project }}"
        CMD="$CMD --files-table ${{ inputs.files_table }}"
        CMD="$CMD --records-table ${{ inputs.records_table }}"

        if [ "${{ inputs.dry_run }}" = "true" ]; then
          CMD="$CMD --dry-run"
        fi

        if [ "${{ inputs.annotate }}" = "false" ]; then
          CMD="$CMD --no-annotate"
        fi

        if [ "${{ inputs.skip_files }}" = "true" ]; then
          CMD="$CMD --skip-files"
        fi

        if [ "${{ inputs.skip_records }}" = "true" ]; then
          CMD="$CMD --skip-records"
        fi

        echo "Running: $CMD"
        $CMD
